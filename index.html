<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-vs-AfD | Was die AfD wirklich sagt</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --bg2: #0f0f0f;
            --card: #161616;
            --card-hover: #1c1c1c;
            --white: #ffffff;
            --gray: #555;
            --light-gray: #777;
            --red: #ef4444;
            --red-dark: #991b1b;
            --green: #22c55e;
            --green-dark: #166534;
            --yellow: #eab308;
            --yellow-dark: #854d0e;
            --border: #262626;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--white);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Header */
        .header {
            padding: 48px 24px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, #111 0%, var(--bg) 100%);
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--red);
            border-radius: 2px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .logo .ai { color: var(--red); }
        .logo .vs { color: var(--gray); margin: 0 8px; }
        .logo .afd { 
            background: linear-gradient(135deg, #333 0%, #444 100%);
            padding: 4px 12px;
            border-radius: 6px;
            color: #ccc;
            font-size: 0.85em;
        }

        .tagline {
            color: var(--light-gray);
            font-size: 1.1rem;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 48px;
            padding: 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg2);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-value.red { color: var(--red); }
        .stat-value.yellow { color: var(--yellow); }
        .stat-value.green { color: var(--green); }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray);
        }

        /* Filter Section */
        .filter-section {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .filter-group {
            margin-bottom: 12px;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gray);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .filter-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--gray);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.15s;
            font-family: inherit;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: var(--card-hover);
            border-color: var(--light-gray);
            color: var(--white);
        }

        .filter-btn.active {
            background: var(--red);
            border-color: var(--red);
            color: white;
        }

        /* Feed */
        .feed {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* Card */
        .card {
            background: var(--card);
            border-radius: 16px;
            margin-bottom: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .card:hover {
            border-color: #333;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        .card-header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }

        .level-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 6px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .level-badge.bund {
            background: var(--red-dark);
            color: #fca5a5;
        }

        .level-badge.land {
            background: var(--green-dark);
            color: #86efac;
        }

        .source-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .card-date {
            color: var(--gray);
            font-size: 0.85rem;
            margin-left: auto;
        }

        .card-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 768px) {
            .card-body {
                grid-template-columns: 1fr;
            }
            .statement-side {
                border-right: none !important;
                border-bottom: 1px solid var(--border);
            }
            .stats-bar {
                gap: 24px;
            }
            .stat-value {
                font-size: 1.5rem;
            }
        }

        .statement-side {
            padding: 28px;
            background: linear-gradient(135deg, rgba(239,68,68,0.08) 0%, rgba(239,68,68,0.03) 100%);
            border-right: 1px solid var(--border);
        }

        .side-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .side-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .statement-side .side-icon {
            background: rgba(239,68,68,0.2);
        }

        .fact-side .side-icon {
            background: rgba(34,197,94,0.2);
        }

        .side-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .statement-side .side-title {
            color: var(--red);
        }

        .fact-side .side-title {
            color: var(--green);
        }

        .statement-text {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--white);
        }

        .fact-side {
            padding: 28px;
            background: linear-gradient(135deg, rgba(34,197,94,0.05) 0%, rgba(34,197,94,0.02) 100%);
        }

        .verdict-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .verdict-badge.false {
            background: var(--red);
            color: white;
        }

        .verdict-badge.misleading {
            background: var(--yellow);
            color: #000;
        }

        .verdict-badge.fact {
            background: var(--green);
            color: white;
        }

        .fact-text {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--light-gray);
            margin-bottom: 20px;
        }

        /* Sources */
        .sources-header {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gray);
            margin-bottom: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sources-header::before {
            content: '📚';
            font-size: 0.8rem;
        }

        .sources-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .source-link {
            display: block;
            color: var(--light-gray);
            font-size: 0.85rem;
            text-decoration: none;
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: all 0.15s;
        }

        .source-link:hover {
            background: rgba(255,255,255,0.06);
            border-color: var(--gray);
            color: var(--white);
        }

        /* Empty State */
        .empty {
            text-align: center;
            padding: 100px 24px;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .empty-text {
            color: var(--gray);
            font-size: 1rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 48px 24px;
            border-top: 1px solid var(--border);
            color: var(--gray);
            font-size: 0.85rem;
        }

        .footer a {
            color: var(--red);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Animation for new cards */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="ai">AI</span><span class="vs">-vs-</span><span class="afd">AfD</span>
        </div>
        <p class="tagline">Was die AfD sagt — und was wirklich stimmt. Mit Quellen.</p>
    </header>

    <div class="stats-bar">
        <div class="stat">
            <div class="stat-value" id="total">0</div>
            <div class="stat-label">Geprüfte Aussagen</div>
        </div>
        <div class="stat">
            <div class="stat-value red" id="false-count">0</div>
            <div class="stat-label">Falsch</div>
        </div>
        <div class="stat">
            <div class="stat-value yellow" id="misleading-count">0</div>
            <div class="stat-label">Irreführend</div>
        </div>
        <div class="stat">
            <div class="stat-value green" id="fact-count">0</div>
            <div class="stat-label">Stimmt</div>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-group">
            <div class="filter-label">Ebene</div>
            <div class="filter-row" id="level-filter">
                <button class="filter-btn active" data-filter="all">Alle</button>
                <button class="filter-btn" data-filter="bund">Bund</button>
                <button class="filter-btn" data-filter="land">Land</button>
            </div>
        </div>
        <div class="filter-group">
            <div class="filter-label">Bundesland</div>
            <div class="filter-row" id="state-filter">
                <button class="filter-btn active" data-filter="all">Alle</button>
                <button class="filter-btn" data-filter="BW">BW</button>
                <button class="filter-btn" data-filter="BY">BY</button>
                <button class="filter-btn" data-filter="BE">BE</button>
                <button class="filter-btn" data-filter="BB">BB</button>
                <button class="filter-btn" data-filter="HB">HB</button>
                <button class="filter-btn" data-filter="HH">HH</button>
                <button class="filter-btn" data-filter="HE">HE</button>
                <button class="filter-btn" data-filter="MV">MV</button>
                <button class="filter-btn" data-filter="NI">NI</button>
                <button class="filter-btn" data-filter="NW">NW</button>
                <button class="filter-btn" data-filter="RP">RP</button>
                <button class="filter-btn" data-filter="SL">SL</button>
                <button class="filter-btn" data-filter="SN">SN</button>
                <button class="filter-btn" data-filter="ST">ST</button>
                <button class="filter-btn" data-filter="SH">SH</button>
                <button class="filter-btn" data-filter="TH">TH</button>
            </div>
        </div>
        <div class="filter-group">
            <div class="filter-label">Ergebnis</div>
            <div class="filter-row" id="verdict-filter">
                <button class="filter-btn active" data-filter="all">Alle</button>
                <button class="filter-btn" data-filter="false">Falsch</button>
                <button class="filter-btn" data-filter="misleading">Irreführend</button>
                <button class="filter-btn" data-filter="fact">Stimmt</button>
            </div>
        </div>
    </div>

    <div class="feed" id="feed">
        <div class="empty">
            <div class="empty-icon">📋</div>
            <div class="empty-title">Lädt...</div>
        </div>
    </div>

    <footer class="footer">
        Faktencheck mit Quellen. Selbst urteilen.<br>
        <a href="https://github.com/FreakyLetsFail/ai-vs-afd" target="_blank">GitHub</a>
    </footer>

    <script>
        const data = [
            {
                id: '1',
                level: 'bund',
                state: 'bund',
                source: 'Alice Weidel, AfD Bundespartei',
                date: '29.04.2026',
                statement: '200.000 Jobs in Gefahr – Merz-Regierung verschärft Wirtschaftskrise',
                verdict: 'false',
                factText: 'Die Bundesagentur für Arbeit meldet stabile Beschäftigtenzahlen. Die Arbeitslosenquote liegt bei 5,8% — unter dem 10-Jahres-Durchschnitt. Von "200.000 Jobs in Gefahr" kann keine Rede sein.',
                sources: [
                    { title: 'Bundesagentur für Arbeit: Arbeitsmarktbericht April 2026', url: '#' },
                    { title: 'Destatis: Erwerbstätigenzahl Q1 2026', url: '#' }
                ]
            },
            {
                id: '2',
                level: 'bund',
                state: 'bund',
                source: 'Peter Boehringer, AfD Bundestag',
                date: '28.04.2026',
                statement: 'Der Regierung geht das Geld aus – ein finanzpolitischer Staatsstreich',
                verdict: 'misleading',
                factText: 'Die Neuverschuldung 2026 beträgt ca. 50 Mrd. Euro — deutlich weniger als 2020-2022. Deutschland hat eine der niedrigsten Staatsschuldenquoten der EU.',
                sources: [
                    { title: 'Bundesfinanzministerium: Haushaltsentwurf 2026', url: '#' },
                    { title: 'Eurostat: Staatsschuldenquote EU 2025', url: '#' }
                ]
            },
            {
                id: '3',
                level: 'land',
                state: 'TH',
                source: 'AfD Thüringen',
                date: '27.04.2026',
                statement: 'Möller: Thüringer Kommunalwahlrecht verletzt Privatsphäre der Kandidaten',
                verdict: 'misleading',
                factText: 'Das Kommunalwahlrecht schützt Kandidaten durch klare Datenschutzregeln. Die AfD fordert hier Anonymität für sich, während sie selbst Parteien angreift die Transparenz fordern.',
                sources: [
                    { title: 'Thüringer Landeswahlleiter: Kommunalwahlrecht FAQ', url: '#' }
                ]
            },
            {
                id: '4',
                level: 'bund',
                state: 'bund',
                source: 'Kay Gottschalk, AfD Bundestag',
                date: '26.04.2026',
                statement: 'Milliardenschulden ohne Mehrwert',
                verdict: 'misleading',
                factText: 'Die Investitionen fließen in Infrastruktur, Bildung, Digitalisierung. Der volkswirtschaftliche Nutzen von Infrastrukturinvestitionen liegt laut IW Köln bei 2-3x dem eingesetzten Kapital.',
                sources: [
                    { title: 'IW Köln: Infrastrukturinvestitionen und Wachstum 2025', url: '#' },
                    { title: 'Bundesverkehrsministerium: Investitionsbericht 2025', url: '#' }
                ]
            }
        ];

        let filtered = [...data];
        let filters = { level: 'all', state: 'all', verdict: 'all' };

        function updateStats() {
            document.getElementById('total').textContent = data.length;
            document.getElementById('false-count').textContent = data.filter(d => d.verdict === 'false').length;
            document.getElementById('misleading-count').textContent = data.filter(d => d.verdict === 'misleading').length;
            document.getElementById('fact-count').textContent = data.filter(d => d.verdict === 'fact').length;
        }

        function render() {
            const feed = document.getElementById('feed');
            
            if (filtered.length === 0) {
                feed.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-title">Keine Einträge</div>
                        <div class="empty-text">Versuche einen anderen Filter</div>
                    </div>`;
                return;
            }

            feed.innerHTML = filtered.map(item => `
                <article class="card" data-level="${item.state}" data-verdict="${item.verdict}">
                    <div class="card-header">
                        <span class="level-badge ${item.state === 'bund' ? 'bund' : 'land'}">${item.state === 'bund' ? 'BUND' : item.state}</span>
                        <span class="source-name">${item.source}</span>
                        <span class="card-date">${item.date}</span>
                    </div>
                    <div class="card-body">
                        <div class="statement-side">
                            <div class="side-header">
                                <div class="side-icon">📣</div>
                                <div class="side-title">Was die AfD sagt</div>
                            </div>
                            <p class="statement-text">"${item.statement}"</p>
                        </div>
                        <div class="fact-side">
                            <div class="side-header">
                                <div class="side-icon">🔬</div>
                                <div class="side-title">Die Fakten</div>
                            </div>
                            <span class="verdict-badge ${item.verdict}">
                                ${item.verdict === 'false' ? '✕ Falsch' : item.verdict === 'misleading' ? '⚠ Irreführend' : '✓ Stimmt'}
                            </span>
                            <p class="fact-text">${item.factText}</p>
                            <div class="sources-header">Quellen</div>
                            <div class="sources-list">
                                ${item.sources.map(s => `<a href="${s.url}" class="source-link" target="_blank">${s.title}</a>`).join('')}
                            </div>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        function applyFilters() {
            filtered = data.filter(item => {
                // Level filter
                if (filters.level !== 'all') {
                    if (filters.level === 'bund' && item.state !== 'bund') return false;
                    if (filters.level === 'land' && item.state === 'bund') return false;
                }
                // State filter
                if (filters.state !== 'all' && item.state !== filters.state) return false;
                // Verdict filter
                if (filters.verdict !== 'all' && item.verdict !== filters.verdict) return false;
                return true;
            });
            render();
        }

        function setupFilter(id, key) {
            document.querySelectorAll(`#${id} .filter-btn`).forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll(`#${id} .filter-btn`).forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filters[key] = btn.dataset.filter;
                    applyFilters();
                });
            });
        }

        setupFilter('level-filter', 'level');
        setupFilter('state-filter', 'state');
        setupFilter('verdict-filter', 'verdict');

        updateStats();
        render();
    </script>
</body>
</html>
