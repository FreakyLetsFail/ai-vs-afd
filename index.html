        .logo {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .logo .ai { color: var(--red); }
        .logo .vs { color: var(--gray); margin: 0 8px; }

            color: #ccc;

        .tagline {

        .stats-bar {

            gap: 32px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg2);
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 2px;
        }

        .stat-value.red { color: var(--red); }
        .stat-value.yellow { color: var(--yellow); }
        .stat-value.green { color: var(--green); }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray);
        }

        /* Filter Section - NO STICKY */
        .filter-section {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg2);
        }

        .filter-group {
            margin-bottom: 10px;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gray);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .filter-row {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--gray);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.15s;
            font-family: inherit;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: var(--card-hover);
            border-color: var(--light-gray);
            color: var(--white);
        }

        .filter-btn.active {
            background: var(--red);
            border-color: var(--red);
            color: white;
        }

        /* Feed */
        .feed {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Card */
        .card {
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .card:hover {
            border-color: #333;
        }

            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
            flex-wrap: wrap;

            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;

        .level-badge.bund {
            background: var(--red-dark);

            align-items: center;

            margin-bottom: 12px;

        .side-icon {
            font-size: 1rem;
        }

        .side-title {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .statement-side .side-title {
            color: var(--red);
        }

        .fact-side .side-title {
            color: var(--green);
        }

        .statement-text {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--white);
        }

        .fact-side {
            padding: 20px;
            background: linear-gradient(135deg, rgba(34,197,94,0.05) 0%, rgba(34,197,94,0.02) 100%);

            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;

        .verdict-badge.false {
            background: var(--red);
            color: white;
        }

        .verdict-badge.misleading {
            background: var(--yellow);
            color: #000;
        }

        .verdict-badge.fact {
            background: var(--green);
            color: white;

        .fact-text {

            line-height: 1.6;

            border-color: var(--gray);
            color: var(--white);

            color: var(--gray);

            to {

        }

            display: none;
        }

                    { title: 'Fraunhofer ISE: Stromgestehungskosten', url: 'https://www.ise.fraunhofer.de/' },
                    { title: 'BNetzA: Strompreisanalyse', url: 'https://www.bundesnetzagentur.de/' }
                ]
            },
            {
                id: '14',
                level: 'bund',
                state: 'bund',
                source: 'Alice Weidel, AfD Bundespartei',
                date: '2026-04-16',
                statement: 'Gender-Verbot ist notwendig um deutsche Kultur zu schützen',
                verdict: 'false',
                factText: 'Deutsche Kultur ist vielfältig und verändert sich seit Jahrhunderten. Gender-Debatte ist ein Ablenkungsmanöver von echten Problemen.',
                sources: [
                    { title: 'Bundeszentrale: Kultur in Deutschland', url: 'https://www.bpb.de/' }
                ]
            },
            {
                id: '15',
                level: 'land',
                state: 'BB',
                source: 'AfD Brandenburg',
                date: '2026-04-15',
                statement: 'Die Kriminalität steigt durch Migration',
                verdict: 'false',
                factText: 'Die Kriminalitätsstatistik zeigt: Die meisten Straftaten werden von deutschen Staatsbürgern begangen. Migration korreliert nicht signifikant mit Kriminalitätsrate.',
                sources: [
                    { title: 'PKS: Polizeiliche Kriminalstatistik', url: 'https://www.bka.de/DE/PolizeilicheKriminalstatistik/pks_node.html' },
                    { title: 'Destatis: Kriminalität und Migration', url: 'https://www.destatis.de/' }
                ]
            },
            {
                id: '16',
                level: 'bund',
                state: 'bund',
                source: 'AfD Bundestag',
                date: '2026-04-14',
                statement: 'Der Verbrenner-Ausstieg vernichtet Arbeitsplätze',
                verdict: 'misleading',
                factText: 'Der Verbrenner-Ausstieg schafft neue Jobs in E-Mobilität und erneuerbaren Energien. Automobilindustrie baut um — nicht weg.',
                sources: [
                    { title: 'Fraunhofer: Beschäftigung Energiewende', url: 'https://www.fraunhofer.de/' },
                    { title: 'IAB: Arbeitsmarkteffekte', url: 'https://www.iab.de/' }
                ]
            }
        ];

        let filtered = [...data];
        let filters = { level: 'all', state: 'all', verdict: 'all' };

        function updateStats() {
            document.getElementById('total').textContent = data.length;
            document.getElementById('false-count').textContent = data.filter(d => d.verdict === 'false').length;
            document.getElementById('misleading-count').textContent = data.filter(d => d.verdict === 'misleading').length;
            document.getElementById('fact-count').textContent = data.filter(d => d.verdict === 'fact').length;
        }

        function render() {
            const feed = document.getElementById('feed');
            
            if (filtered.length === 0) {
                feed.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-title">Keine Einträge</div>
                        <div class="empty-text">Versuche einen anderen Filter</div>
                    </div>`;
                return;
            }

            feed.innerHTML = filtered.map(item => `
                <article class="card" data-level="${item.state}" data-verdict="${item.verdict}" data-date="${item.date}">
                    <div class="card-header">
                        <span class="level-badge ${item.state === 'bund' ? 'bund' : 'land'}">${item.state === 'bund' ? 'BUND' : item.state}</span>
                        <span class="source-name">${item.source}</span>
                        <span class="card-date">${item.date}</span>
                    </div>
                    <div class="card-body">
                        <div class="statement-side">
                            <div class="side-header">
                                <span class="side-icon">📣</span>
                                <span class="side-title">AfD sagt</span>
                            </div>
                            <p class="statement-text">"${item.statement}"</p>
                        </div>
                        <div class="fact-side">
                            <div class="side-header">
                                <span class="side-icon">🔬</span>
                                <span class="side-title">Fakten</span>
                            </div>
                            <span class="verdict-badge ${item.verdict}">${VERDICT_LABELS[item.verdict] || item.verdict}</span>
                            <p class="fact-text">${item.factText}</p>
                            <div class="sources-header">Quellen</div>
                            <div class="sources-list">
                                ${item.sources.map(s => `<a href="${s.url}" class="source-link" target="_blank" rel="noopener">${s.title}</a>`).join('')}
                            </div>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        function applyFilters() {
            filtered = data.filter(item => {
                if (filters.level !== 'all') {
                    if (filters.level === 'bund' && item.state !== 'bund') return false;
                    if (filters.level === 'land' && item.state === 'bund') return false;
                }
                if (filters.state !== 'all' && item.state !== filters.state) return false;
                if (filters.verdict !== 'all' && item.verdict !== filters.verdict) return false;
                return true;
            });
            render();
        }

        function setupFilter(id, key) {
            document.querySelectorAll(`#${id} .filter-btn`).forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll(`#${id} .filter-btn`).forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filters[key] = btn.dataset.filter;
                    applyFilters();
                });
            });
        }

        setupFilter('level-filter', 'level');
        setupFilter('state-filter', 'state');
        setupFilter('verdict-filter', 'verdict');

        // Init - sorted by date (newest first) already in data array
        updateStats();
        render();
    </script>
</body>
</html>
