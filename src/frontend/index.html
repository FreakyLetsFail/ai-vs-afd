<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-vs-AfD | Faktencheck</title>
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-card: #1a1a1a;
            --bg-card-hover: #222;
            --text-primary: #ffffff;
            --text-secondary: #888;
            --accent: #e53935;
            --accent-green: #4caf50;
            --accent-yellow: #ffc107;
            --border: #333;
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            padding: 40px 0;
            text-align: center;
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        h1 span:first-child {
            color: var(--accent);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .filter-section {
            margin-bottom: 16px;
        }

        .filter-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .filter-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            font-family: var(--font-main);
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .feed {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .fact-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .fact-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .card-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
            gap: 8px;
        }

        .source-badge {
            background: var(--bg-primary);
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .card-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 900px) {
            .card-body {
                grid-template-columns: 1fr;
            }
            .statement-side {
                border-right: none !important;
                border-bottom: 1px solid var(--border);
            }
        }

        .statement-side, .fact-side {
            padding: 24px;
        }

        .statement-side {
            border-right: 1px solid var(--border);
            background: rgba(229, 57, 53, 0.03);
        }

        .fact-side {
            background: rgba(76, 175, 80, 0.03);
        }

        .side-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .statement-text {
            font-size: 1.05rem;
            line-height: 1.7;
        }

        .verdict {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .verdict.false {
            background: var(--accent);
            color: white;
        }

        .verdict.misleading {
            background: var(--accent-yellow);
            color: #000;
        }

        .verdict.fact {
            background: var(--accent-green);
            color: white;
        }

        .fact-content {
            font-size: 1rem;
            line-height: 1.7;
        }

        .sources {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .sources h4 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .source-link {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-decoration: none;
            padding: 4px 0;
            transition: color 0.2s;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .source-link:hover {
            color: var(--accent);
        }

        footer {
            text-align: center;
            padding: 40px 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 60px;
            border-top: 1px solid var(--border);
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .stats {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .level-badge {
            background: rgba(229, 57, 53, 0.2);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>AI</span>-vs-<span style="color: #1a1a1a; background: #ddd; padding: 2px 8px; border-radius: 4px;">AfD</span></h1>
            <p class="subtitle">Automatischer Faktencheck von Aussagen auf Bundes- und Landesebene</p>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="total-count">0</div>
                    <div class="stat-label">Einträge</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="false-count">0</div>
                    <div class="stat-label">Falsch</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="misleading-count">0</div>
                    <div class="stat-label">Irreführend</div>
                </div>
            </div>
        </header>

        <div class="filter-section">
            <div class="filter-label">Ebene</div>
            <div class="filter-bar" id="level-filter">
                <button class="filter-btn active" data-filter="all">Alle</button>
                <button class="filter-btn" data-filter="bund">Bund</button>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-label">Bundesland</div>
            <div class="filter-bar" id="state-filter">
                <button class="filter-btn active" data-filter="all">Alle</button>
                <button class="filter-btn" data-filter="BW">BW</button>
                <button class="filter-btn" data-filter="BY">BY</button>
                <button class="filter-btn" data-filter="BE">BE</button>
                <button class="filter-btn" data-filter="BB">BB</button>
                <button class="filter-btn" data-filter="HB">HB</button>
                <button class="filter-btn" data-filter="HH">HH</button>
                <button class="filter-btn" data-filter="HE">HE</button>
                <button class="filter-btn" data-filter="MV">MV</button>
                <button class="filter-btn" data-filter="NI">NI</button>
                <button class="filter-btn" data-filter="NW">NW</button>
                <button class="filter-btn" data-filter="RP">RP</button>
                <button class="filter-btn" data-filter="SL">SL</button>
                <button class="filter-btn" data-filter="SN">SN</button>
                <button class="filter-btn" data-filter="ST">ST</button>
                <button class="filter-btn" data-filter="SH">SH</button>
                <button class="filter-btn" data-filter="TH">TH</button>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-label">Verdict</div>
            <div class="filter-bar" id="verdict-filter">
                <button class="filter-btn active" data-filter="all">Alle</button>
                <button class="filter-btn" data-filter="false">Falsch</button>
                <button class="filter-btn" data-filter="misleading">Irreführend</button>
                <button class="filter-btn" data-filter="fact">Fakt</button>
            </div>
        </div>

        <div id="feed" class="feed">
            <div class="loading">Lade Daten...</div>
        </div>

        <footer>
            <p>Quellen werden automatisch recherchiert. Kann Fehler enthalten — bitte selbst prüfen.</p>
            <p style="margin-top: 8px; font-size: 0.8rem;">Source Code: <a href="https://github.com/FreakyLetsFail/ai-vs-afd" style="color: var(--accent);">github.com/FreakyLetsFail/ai-vs-afd</a></p>
        </footer>
    </div>

    <script>
        // Sample data structure
        const sampleData = [
            {
                id: '1',
                level: 'bund',
                source: 'AfD Bundestagsfraktion',
                date: '2026-04-29',
                statement: 'Die Inflation entsteht durch zu viel Geld im Umlauf. Wir müssen die Ausgaben drastisch kürzen.',
                verdict: 'misleading',
                factCheck: 'Die aktuelle Inflation (2025/2026) hat andere Ursachen: Lieferkettenprobleme, Energiepreise, Ukraine-Krieg. Nicht "zu viel Geld" allein.',
                sources: [
                    { title: 'Bundesbank Bericht Q1 2026', url: '#' },
                    { title: 'Destatis Inflationsdaten', url: '#' }
                ]
            },
            {
                id: '2',
                level: 'SN',
                source: 'AfD Sachsen',
                date: '2026-04-28',
                statement: 'Migration ist die Hauptursache für die Wohnungskrise.',
                verdict: 'false',
                factCheck: 'Studien zeigen: Demografischer Wandel, Bauregulierung, Spekulation sind Hauptfaktoren. Migration hat geringeren Einfluss als behauptet.',
                sources: [
                    { title: 'IW Köln Studie 2025', url: '#' },
                    { title: 'Bundesinstitut für Bauforschung', url: '#' }
                ]
            },
            {
                id: '3',
                level: 'BY',
                source: 'AfD Bayern',
                date: '2026-04-27',
                statement: 'Deutschlands Grenzen sind nicht sicher.',
                verdict: 'false',
                factCheck: 'Die Grenzkontrollen wurden verstärkt und die Bundespolizei meldet sinkende illegale Grenzübertritte.',
                sources: [
                    { title: 'Bundespolizei Jahresbericht 2025', url: '#' }
                ]
            },
            {
                id: '4',
                level: 'NW',
                source: 'AfD NRW',
                date: '2026-04-26',
                statement: 'Die Elektromobilität ist gescheitert.',
                verdict: 'misleading',
                factCheck: 'Der Anteil von E-Autos an Neuzulassungen liegt bei 25% und wächst. Scheitern sieht anders aus.',
                sources: [
                    { title: 'KBA Neuzulassungen 2026', url: '#' }
                ]
            },
            {
                id: '5',
                level: 'bund',
                source: 'AfD Bundespartei',
                date: '2026-04-25',
                statement: 'Der Klimawandel ist nicht menschengemacht.',
                verdict: 'false',
                factCheck: 'Die wissenschaftliche Evidenz ist erdrückend: über 97% der Klimawissenschaftler stimmen zu. IPCC Berichte, peer-reviewed Studien.',
                sources: [
                    { title: 'IPCC AR6 Report', url: '#' },
                    { title: 'NASA Climate Evidence', url: '#' }
                ]
            }
        ];

        let currentData = [];
        let currentLevel = 'all';
        let currentState = 'all';
        let currentVerdict = 'all';

        function updateStats() {
            document.getElementById('total-count').textContent = currentData.length;
            document.getElementById('false-count').textContent = currentData.filter(d => d.verdict === 'false').length;
            document.getElementById('misleading-count').textContent = currentData.filter(d => d.verdict === 'misleading').length;
        }

        function renderFeed(data) {
            const feed = document.getElementById('feed');
            
            if (!data || data.length === 0) {
                feed.innerHTML = '<div class="empty-state">Keine Einträge gefunden.</div>';
                return;
            }

            feed.innerHTML = data.map(item => `
                <article class="fact-card" data-level="${item.level}" data-verdict="${item.verdict}">
                    <div class="card-header">
                        <span class="source-badge">${item.source}</span>
                        <span class="level-badge">${item.level}</span>
                        <span>${item.date}</span>
                    </div>
                    <div class="card-body">
                        <div class="statement-side">
                            <div class="side-label">Original-Aussage</div>
                            <p class="statement-text">"${item.statement}"</p>
                        </div>
                        <div class="fact-side">
                            <div class="side-label">Faktencheck</div>
                            <span class="verdict ${item.verdict}">${item.verdict.toUpperCase()}</span>
                            <p class="fact-content">${item.factCheck}</p>
                            <div class="sources">
                                <h4>Quellen</h4>
                                ${item.sources.map(s => `<a href="${s.url}" class="source-link" target="_blank" title="${s.title}">${s.title}</a>`).join('')}
                            </div>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        function filterData() {
            let filtered = sampleData;

            if (currentLevel !== 'all') {
                filtered = filtered.filter(d => d.level === currentLevel);
            }

            if (currentState !== 'all') {
                filtered = filtered.filter(d => d.level === currentState);
            }

            if (currentVerdict !== 'all') {
                filtered = filtered.filter(d => d.verdict === currentVerdict);
            }

            currentData = filtered;
            updateStats();
            renderFeed(filtered);
        }

        function setupFilter(filterId, callback) {
            document.querySelectorAll(`#${filterId} .filter-btn`).forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll(`#${filterId} .filter-btn`).forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    callback(btn.dataset.filter);
                    filterData();
                });
            });
        }

        setupFilter('level-filter', (val) => currentLevel = val);
        setupFilter('state-filter', (val) => currentState = val);
        setupFilter('verdict-filter', (val) => currentVerdict = val);

        // Initial render
        currentData = sampleData;
        updateStats();
        renderFeed(sampleData);

        // TODO: Fetch from API
        // fetch('/api/entries').then(r => r.json()).then(data => {
        //     currentData = data;
        //     updateStats();
        //     renderFeed(data);
        // });
    </script>
</body>
</html>
